<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register — Interview Prep</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <header id="landing-topbar">
      <a href="/" id="landing-app-name" style="text-decoration:none">Interview Prep</a>
      <button id="theme-toggle" class="theme-toggle">🌙</button>
    </header>

    <div id="auth-page">
      <div id="auth-card">
        <h1 id="auth-title">Create an account</h1>
        <p id="auth-subtitle">Start preparing for your next interview.</p>

        <form id="register-form">
          <div class="form-row">
            <div class="form-group">
              <label for="first_name">First name</label>
              <input type="text" id="first_name" name="first_name" placeholder="Jane" required />
            </div>
            <div class="form-group">
              <label for="last_name">Last name</label>
              <input type="text" id="last_name" name="last_name" placeholder="Doe" required />
            </div>
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" required />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="••••••••" required />
          </div>
          <p id="auth-error" class="auth-error hidden"></p>
          <button type="submit" class="auth-btn">Create account</button>
        </form>

        <p id="auth-switch">Already have an account? <a href="/login">Log in</a></p>
      </div>
    </div>

    <script src="/static/auth.js"></script>
  </body>
</html>
