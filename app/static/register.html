<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register — Interview Prep</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <header id="topbar">
      <a href="/" id="app-name" style="text-decoration:none">Interview Prep</a>
      <button id="theme-toggle" class="theme-toggle">🌙</button>
    </header>

    <div id="auth-page">
      <div id="auth-card">
        <h1 id="auth-title">Create an account</h1>
        <p id="auth-subtitle">Start preparing for your next interview.</p>

        <form id="register-form">
          <div class="form-row">
            <div class="form-group">
              <label for="first_name">First name</label>
              <input type="text" id="first_name" name="first_name" placeholder="Jane" required />
            </div>
            <div class="form-group">
              <label for="last_name">Last name</label>
              <input type="text" id="last_name" name="last_name" placeholder="Doe" required />
            </div>
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" required />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <div class="input-wrapper">
              <input type="password" id="password" name="password" placeholder="••••••••" required />
              <button type="button" class="toggle-password" data-target="password" aria-label="Toggle password visibility">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
          <div class="form-group">
            <label for="confirm_password">Confirm password</label>
            <div class="input-wrapper">
              <input type="password" id="confirm_password" name="confirm_password" placeholder="••••••••" required />
              <button type="button" class="toggle-password" data-target="confirm_password" aria-label="Toggle password visibility">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
          <p id="auth-error" class="auth-error hidden"></p>
          <button type="submit" class="auth-btn">Create account</button>
        </form>

        <p id="auth-switch">Already have an account? <a href="/login">Log in</a></p>
      </div>
    </div>

    <script src="/static/shared.js"></script>
    <script src="/static/auth.js"></script>
  </body>
</html>
