<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interview Prep</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="/static/style.css" />
    <link id="highlight-css" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark-dimmed.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  </head>
  <body>
    <div id="app">
      <header id="topbar">
        <span id="app-name">Interview Prep</span>
        <button id="theme-toggle">🌙</button>
      </header>
      <div id="main-layout">
        <nav id="sidebar">
          <div id="topic-list"></div>
        </nav>
        <main id="content">
          <div id="article-body">
            <p id="placeholder">Select a topic from the sidebar to start reading.</p>
          </div>
        </main>
      </div>
    </div>
    <script src="/static/app.js"></script>
  </body>
</html>
