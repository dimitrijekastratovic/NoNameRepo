name: CD

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
        contents: read
        packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Log into GHCR
        uses: docker/login-action@v3
        with:
            registry: ghcr.io
            username: ${{ github.actor }}
            password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and tag docker image
        run: docker build -t ghcr.io/${{ github.actor }}/${{ github.event.repository.name }}:${{ github.sha }} .
      - name: Push docker image to GHCR
        run: docker push ghcr.io/${{ github.actor }}/${{ github.event.repository.name }}:${{ github.sha }}